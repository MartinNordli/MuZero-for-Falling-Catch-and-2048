game:
  width: 5
  height: 5
  paddle_width: 1
  episode_length: 40
  catch_reward: 1.0
  miss_reward: -1.0
  distance_shaping: 0.03
  spawn_seed: 2
  history_length: 4

network:
  latent_dim: 64
  hidden_dim: 128

mcts:
  simulations: 25
  max_depth: 5
  pb_c_base: 19652
  pb_c_init: 1.25
  dirichlet_alpha: 0.3
  exploration_fraction: 0.1
  temperature: 0.5

training:
  seed: 7
  episodes: 120
  bootstrap_episodes: 20
  bootstrap_gradient_steps: 80
  bootstrap_policy: "heuristic"
  train_after_episodes: 4
  train_every: 1
  gradient_steps: 8
  batch_size: 32
  buffer_size: 500
  unroll_steps: 4
  discount: 0.95
  learning_rate: 0.001
  weight_decay: 0.0001
  value_loss_weight: 0.5
  reward_loss_weight: 1.0
  policy_loss_weight: 2.0
  gradient_clip: 5.0
  eval_every: 20
  eval_episodes: 20
  checkpoint_path: "artifacts/checkpoints/best.pt"
  final_checkpoint_path: "artifacts/checkpoints/final.pt"
  metrics_path: "artifacts/results/training_metrics.json"

visualization:
  plots_dir: "artifacts/plots"
  demo_dir: "artifacts/demo"
  render_frames: true
